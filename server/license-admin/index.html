<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>9BizClaw License Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #09090b; --surface: #18181b; --border: #27272a; --border-hover: #3f3f46;
    --text: #fafafa; --text-secondary: #a1a1aa; --text-muted: #71717a;
    --accent: #3b82f6; --accent-hover: #2563eb;
    --danger: #ef4444; --danger-hover: #dc2626;
    --success: #22c55e; --warning: #f59e0b;
    --radius: 8px; --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
    min-height: 100vh;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 32px 20px; }
  h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  h2 { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 12px; }

  /* Login */
  #login-view { max-width: 400px; margin: 120px auto; }
  #login-view h1 { margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
  input, select {
    width: 100%; padding: 9px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 14px; outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text-muted); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); color: var(--text); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { border-color: var(--border-hover); background: var(--border); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-danger { background: transparent; border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Layout */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .section { margin-bottom: 40px; }

  /* Create client form */
  .gen-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .gen-row .form-group { margin-bottom: 0; flex: 1; min-width: 120px; }
  .gen-row .form-group.fg-name { min-width: 200px; flex: 2; }

  /* Stats */
  .stats { display: flex; gap: 24px; margin-bottom: 24px; }
  .stat { font-size: 13px; color: var(--text-muted); }
  .stat strong { color: var(--text); font-size: 18px; font-weight: 600; margin-right: 4px; }

  /* Client card */
  .client-card {
    border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 12px; overflow: hidden;
  }
  .client-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; background: var(--surface); cursor: pointer;
    transition: background 0.1s; gap: 12px;
  }
  .client-header:hover { background: #1f1f23; }
  .client-name { font-weight: 600; font-size: 14px; flex: 1; }
  .client-meta { display: flex; gap: 16px; align-items: center; font-size: 12px; color: var(--text-muted); }
  .client-body { border-top: 1px solid var(--border); display: none; }
  .client-card.open .client-body { display: block; }
  .client-card.open .client-chevron { transform: rotate(180deg); }
  .client-chevron { transition: transform 0.15s; color: var(--text-muted); font-size: 11px; }

  /* Key row inside client */
  .key-row {
    display: flex; align-items: center; gap: 14px; padding: 12px 18px;
    border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .key-row:last-child { border-bottom: none; }
  .key-code { font-family: var(--mono); font-size: 13px; letter-spacing: 0.02em; flex: 1; display: flex; align-items: center; gap: 8px; }
  .key-text { cursor: pointer; }
  .key-text:hover { color: var(--accent); }
  .key-toggle { cursor: pointer; color: var(--text-muted); font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; user-select: none; }
  .key-toggle:hover { color: var(--text); }
  .key-masked { letter-spacing: 0.15em; color: var(--text-muted); }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .badge-active { background: rgba(34,197,94,0.15); color: var(--success); }
  .badge-unused { background: rgba(161,161,170,0.15); color: var(--text-muted); }
  .badge-revoked { background: rgba(239,68,68,0.15); color: var(--danger); }

  .machines-inline { font-size: 12px; color: var(--text-secondary); }
  .machines-inline .hostname { color: var(--text); font-weight: 500; }

  .client-actions {
    display: flex; gap: 8px; padding: 12px 18px; border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px; padding: 10px 18px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 13px; z-index: 100; opacity: 0; transform: translateY(8px);
    transition: all 0.2s;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  /* Generated output */
  .generated-output {
    margin-top: 16px; padding: 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .generated-output .client-label { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .generated-output .key-list { font-family: var(--mono); font-size: 13px; line-height: 2; word-break: break-all; }
  .generated-output .key-list span { cursor: pointer; }
  .generated-output .key-list span:hover { color: var(--accent); }
  .generated-output .actions { display: flex; gap: 8px; margin-top: 10px; }

  /* Table for ungrouped */
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 14px; background: var(--surface); color: var(--text-muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .note { font-size: 12px; color: var(--text-muted); max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
  .date { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }

  /* Responsive */
  @media (max-width: 640px) {
    .gen-row { flex-direction: column; }
    .gen-row .form-group { min-width: 0; }
    .stats { flex-wrap: wrap; gap: 16px; }
    .client-meta { flex-wrap: wrap; gap: 8px; }
    .key-row { flex-wrap: wrap; gap: 8px; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-view">
  <div class="container">
    <h1>9BizClaw License Admin</h1>
    <div class="form-group">
      <label>Worker URL</label>
      <input id="inp-url" type="url" placeholder="https://license.your-domain.workers.dev" spellcheck="false">
    </div>
    <div class="form-group">
      <label>Admin Secret</label>
      <input id="inp-secret" type="password" placeholder="Bearer token">
    </div>
    <button class="btn btn-primary" onclick="doLogin()" style="width:100%;justify-content:center;margin-top:8px">Connect</button>
  </div>
</div>

<!-- Dashboard -->
<div id="dash-view" class="hidden">
  <div class="container">
    <div class="header">
      <h1>9BizClaw License Admin</h1>
      <div class="header-right">
        <button class="btn btn-sm" onclick="loadClients()">Refresh</button>
        <button class="btn btn-sm" onclick="doLogout()">Disconnect</button>
      </div>
    </div>

    <!-- Create client -->
    <div class="section">
      <h2>New Client</h2>
      <div class="gen-row">
        <div class="form-group fg-name">
          <label>Client Name</label>
          <input id="gen-name" type="text" placeholder="Company or person name">
        </div>
        <div class="form-group">
          <label>Note</label>
          <input id="gen-note" type="text" placeholder="Optional">
        </div>
        <div class="form-group" style="flex:0">
          <label>&nbsp;</label>
          <button class="btn btn-primary" id="gen-btn" onclick="createClient()">Create</button>
        </div>
      </div>
      <div id="gen-output" class="hidden"></div>
    </div>

    <!-- Client list -->
    <div class="section">
      <h2>Clients</h2>
      <div class="stats" id="stats"></div>
      <div id="clients-container"><div class="loading">Loading...</div></div>
    </div>

    <!-- Ungrouped keys (legacy) -->
    <div class="section hidden" id="ungrouped-section">
      <h2>Ungrouped Keys (Legacy)</h2>
      <div id="ungrouped-container"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let API_URL = '';
let API_SECRET = '';

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 2500);
}

async function api(path, body = {}) {
  const res = await fetch(API_URL + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + API_SECRET },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'API error');
  return data;
}

function doLogin() {
  const url = document.getElementById('inp-url').value.trim().replace(/\/+$/, '');
  const secret = document.getElementById('inp-secret').value.trim();
  if (!url || !secret) return toast('Fill both fields', true);
  API_URL = url;
  API_SECRET = secret;
  sessionStorage.setItem('lk_url', url);
  sessionStorage.setItem('lk_secret', secret);
  document.getElementById('login-view').classList.add('hidden');
  document.getElementById('dash-view').classList.remove('hidden');
  loadClients();
}

function doLogout() {
  sessionStorage.removeItem('lk_url');
  sessionStorage.removeItem('lk_secret');
  API_URL = ''; API_SECRET = '';
  document.getElementById('dash-view').classList.add('hidden');
  document.getElementById('login-view').classList.remove('hidden');
}

// Auto-restore session
(function() {
  const u = sessionStorage.getItem('lk_url');
  const s = sessionStorage.getItem('lk_secret');
  if (u && s) { API_URL = u; API_SECRET = s; document.getElementById('login-view').classList.add('hidden'); document.getElementById('dash-view').classList.remove('hidden'); loadClients(); }
})();

async function createClient() {
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  try {
    const name = document.getElementById('gen-name').value.trim();
    if (!name) { toast('Enter a client name', true); btn.disabled = false; return; }
    const maxMachines = 1;
    const note = document.getElementById('gen-note').value.trim();

    const data = await api('/api/admin/create-client', { name, keysPerClient: 3, maxMachines, note });
    const client = data.client;

    const out = document.getElementById('gen-output');
    out.classList.remove('hidden');
    out.innerHTML = '<div class="generated-output">' +
      '<div class="client-label">' + esc(client.name) + ' (' + client.keys.length + ' keys)</div>' +
      '<div class="key-list">' + client.keys.map(k =>
        '<div class="key-code">' +
          '<span class="key-toggle" onclick="toggleKeyVis(this)">&#9679;</span>' +
          '<span class="key-text key-masked" data-key="' + esc(k) + '" onclick="copyKeyFromData(this)">' + maskKeyStr(k) + '</span>' +
        '</div>'
      ).join('') + '</div>' +
      '<div class="actions">' +
        '<button class="btn btn-sm" onclick="copyAllGen()">Copy all</button>' +
        '<button class="btn btn-sm btn-primary" onclick="downloadGen(\'' + esc(client.name) + '\')">Download .txt</button>' +
      '</div></div>';

    document.getElementById('gen-name').value = '';
    document.getElementById('gen-note').value = '';
    toast(client.name + ' created with ' + client.keys.length + ' keys');
    loadClients();
  } catch (e) { toast(e.message, true); }
  btn.disabled = false;
}

function maskKeyStr(key) {
  if (!key || key.length < 10) return '••••••••';
  return key.slice(0, 5) + '•'.repeat(Math.min(key.length - 9, 20)) + key.slice(-4);
}

function toggleKeyVis(toggle) {
  const textEl = toggle.nextElementSibling;
  const realKey = textEl.dataset.key;
  if (textEl.classList.contains('key-masked')) {
    textEl.textContent = realKey;
    textEl.classList.remove('key-masked');
    toggle.innerHTML = '&#9675;';
  } else {
    textEl.textContent = maskKeyStr(realKey);
    textEl.classList.add('key-masked');
    toggle.innerHTML = '&#9679;';
  }
}

function copyKeyFromData(el) {
  navigator.clipboard.writeText(el.dataset.key);
  toast('Copied');
}

function copyKey(el) {
  navigator.clipboard.writeText(el.textContent);
  toast('Copied');
}

function copyAllGen() {
  const keys = document.querySelectorAll('#gen-output .key-text');
  navigator.clipboard.writeText(Array.from(keys).map(k => k.dataset.key).join('\n'));
  toast('All keys copied');
}

function downloadGen(clientName) {
  const keys = document.querySelectorAll('#gen-output .key-text');
  const text = '9BizClaw License Keys\nClient: ' + clientName + '\nGenerated: ' + new Date().toLocaleString() + '\n' +
    '----------------------------------------\n\n' +
    Array.from(keys).map((k, i) => 'Key ' + (i + 1) + ': ' + k.dataset.key).join('\n') +
    '\n\n----------------------------------------\nEach key activates on 1 machine.\n';
  downloadTextFile(clientName.replace(/[^a-zA-Z0-9_-]/g, '_') + '-licenses.txt', text);
}

function downloadClientKeys(clientId) {
  const card = document.querySelector('[data-client-id="' + clientId + '"]');
  if (!card) return;
  const name = card.dataset.clientName;
  const keyEls = card.querySelectorAll('.key-text');
  const lines = [];
  keyEls.forEach((el, i) => {
    const status = el.closest('.key-row').querySelector('.badge').textContent.trim();
    lines.push('Key ' + (i + 1) + ': ' + el.dataset.key + '  [' + status + ']');
  });
  const text = '9BizClaw License Keys\nClient: ' + name + '\nExported: ' + new Date().toLocaleString() + '\n' +
    '----------------------------------------\n\n' + lines.join('\n') + '\n';
  downloadTextFile(name.replace(/[^a-zA-Z0-9_-]/g, '_') + '-licenses.txt', text);
}

function downloadTextFile(filename, content) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

function toggleCard(el) {
  el.closest('.client-card').classList.toggle('open');
}

async function loadClients() {
  const container = document.getElementById('clients-container');
  container.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const data = await api('/api/admin/list-clients');
    renderClients(data.clients, data.ungrouped);
  } catch (e) {
    container.innerHTML = '<div class="loading" style="color:var(--danger)">Failed: ' + esc(e.message) + '</div>';
  }
}

function renderClients(clients, ungrouped) {
  // Stats
  let totalKeys = 0, activeKeys = 0, revokedKeys = 0, unusedKeys = 0;
  for (const c of clients) {
    for (const k of c.keys) {
      totalKeys++;
      if (k.revokedAt) revokedKeys++;
      else if (k.machines?.length > 0) activeKeys++;
      else unusedKeys++;
    }
  }
  for (const k of (ungrouped || [])) {
    totalKeys++;
    if (k.revokedAt) revokedKeys++;
    else if (k.machines?.length > 0) activeKeys++;
    else unusedKeys++;
  }

  document.getElementById('stats').innerHTML =
    '<div class="stat"><strong>' + clients.length + '</strong>Clients</div>' +
    '<div class="stat"><strong>' + totalKeys + '</strong>Keys</div>' +
    '<div class="stat"><strong>' + activeKeys + '</strong>Active</div>' +
    '<div class="stat"><strong>' + unusedKeys + '</strong>Unused</div>' +
    '<div class="stat"><strong>' + revokedKeys + '</strong>Revoked</div>';

  // Client cards
  const container = document.getElementById('clients-container');
  if (clients.length === 0) {
    container.innerHTML = '<div class="loading">No clients yet. Create one above.</div>';
  } else {
    container.innerHTML = clients.map(c => renderClientCard(c)).join('');
  }

  // Ungrouped legacy keys
  const ugSection = document.getElementById('ungrouped-section');
  if (ungrouped && ungrouped.length > 0) {
    ugSection.classList.remove('hidden');
    document.getElementById('ungrouped-container').innerHTML = renderUngroupedTable(ungrouped);
  } else {
    ugSection.classList.add('hidden');
  }
}

function renderClientCard(client) {
  const keys = client.keys || [];
  const active = keys.filter(k => !k.revokedAt && k.machines?.length > 0).length;
  const revoked = keys.filter(k => k.revokedAt).length;
  const unused = keys.length - active - revoked;
  const allRevoked = keys.length > 0 && revoked === keys.length;
  const created = keys.length > 0 ? fmtDate(keys[0].createdAt) : '';

  let statusSummary = '';
  if (allRevoked) statusSummary = '<span class="badge badge-revoked">All revoked</span>';
  else if (active > 0) statusSummary = '<span class="badge badge-active">' + active + ' active</span>';
  else statusSummary = '<span class="badge badge-unused">' + unused + ' unused</span>';

  let keyRows = keys.map(k => {
    const st = k.revokedAt ? 'revoked' : (k.machines?.length > 0 ? 'active' : 'unused');
    const stLabel = k.revokedAt ? 'Revoked' : (k.machines?.length > 0 ? 'Active' : 'Unused');
    const badgeCls = k.revokedAt ? 'badge-revoked' : (k.machines?.length > 0 ? 'badge-active' : 'badge-unused');

    let machineInfo = '';
    if (k.machines?.length > 0) {
      machineInfo = '<span class="machines-inline">' +
        k.machines.map(m => '<span class="hostname">' + esc(m.hostname || '?') + '</span> ' + relTime(m.lastSeen)).join(', ') +
        '</span>';
    }

    return '<div class="key-row">' +
      '<span class="key-code">' +
        '<span class="key-toggle" onclick="toggleKeyVis(this)">&#9679;</span>' +
        '<span class="key-text key-masked" data-key="' + esc(k.key) + '" onclick="copyKeyFromData(this)">' + maskKeyStr(k.key) + '</span>' +
      '</span>' +
      '<span class="badge ' + badgeCls + '">' + stLabel + '</span>' +
      machineInfo +
      (k.revokedAt ? '' : '<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();revokeKey(\'' + esc(k.key) + '\')">Revoke</button>') +
      '</div>';
  }).join('');

  return '<div class="client-card" data-client-id="' + esc(client.id) + '" data-client-name="' + esc(client.name) + '">' +
    '<div class="client-header" onclick="toggleCard(this)">' +
      '<span class="client-name">' + esc(client.name) + '</span>' +
      '<div class="client-meta">' +
        statusSummary +
        '<span>' + keys.length + ' keys</span>' +
        '<span>' + created + '</span>' +
        '<span class="client-chevron">&#9660;</span>' +
      '</div>' +
    '</div>' +
    '<div class="client-body">' +
      keyRows +
      '<div class="client-actions">' +
        '<button class="btn btn-sm" onclick="downloadClientKeys(\'' + esc(client.id) + '\')">Download .txt</button>' +
        '<button class="btn btn-sm" onclick="copyClientKeys(\'' + esc(client.id) + '\')">Copy all keys</button>' +
        (allRevoked ? '' : '<button class="btn btn-danger btn-sm" onclick="revokeClient(\'' + esc(client.id) + '\', \'' + esc(client.name) + '\')">Revoke all</button>') +
      '</div>' +
    '</div></div>';
}

function renderUngroupedTable(keys) {
  keys.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  let html = '<div class="table-wrap"><table><thead><tr>' +
    '<th>Key</th><th>Status</th><th>Note</th><th>Created</th><th></th>' +
    '</tr></thead><tbody>';
  for (const k of keys) {
    const badgeCls = k.revokedAt ? 'badge-revoked' : (k.machines?.length > 0 ? 'badge-active' : 'badge-unused');
    const stLabel = k.revokedAt ? 'Revoked' : (k.machines?.length > 0 ? 'Active' : 'Unused');
    html += '<tr>' +
      '<td><span class="key-code" onclick="copyKey(this)">' + esc(k.key) + '</span></td>' +
      '<td><span class="badge ' + badgeCls + '">' + stLabel + '</span></td>' +
      '<td><span class="note">' + esc(k.note || '') + '</span></td>' +
      '<td><span class="date">' + fmtDate(k.createdAt) + '</span></td>' +
      '<td>' + (k.revokedAt ? '' : '<button class="btn btn-danger btn-sm" onclick="revokeKey(\'' + esc(k.key) + '\')">Revoke</button>') + '</td>' +
      '</tr>';
  }
  html += '</tbody></table></div>';
  return html;
}

function copyClientKeys(clientId) {
  const card = document.querySelector('[data-client-id="' + clientId + '"]');
  if (!card) return;
  const keys = Array.from(card.querySelectorAll('.key-text')).map(el => el.dataset.key);
  navigator.clipboard.writeText(keys.join('\n'));
  toast(keys.length + ' keys copied');
}

async function revokeKey(key) {
  if (!confirm('Revoke ' + key + '?\nThis cannot be undone.')) return;
  try {
    await api('/api/admin/revoke', { key });
    toast('Key revoked');
    loadClients();
  } catch (e) { toast(e.message, true); }
}

async function revokeClient(clientId, clientName) {
  if (!confirm('Revoke ALL keys for ' + clientName + '?\nThis cannot be undone.')) return;
  try {
    const data = await api('/api/admin/revoke-client', { clientId });
    toast(data.revokedCount + ' keys revoked for ' + clientName);
    loadClients();
  } catch (e) { toast(e.message, true); }
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function relTime(iso) {
  if (!iso) return 'never';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}
