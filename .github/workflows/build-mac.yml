name: Build Mac .dmg

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub Release with the .dmg files'
        required: false
        default: 'false'

permissions:
  contents: write   # Needed to create releases + upload assets

jobs:
  build:
    name: Build ${{ matrix.arch }} on ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14   # Apple Silicon (M-series)
          - arch: x64
            runner: macos-14   # macos-13 retired — build x64 from arm64 runner via Rosetta/cross


    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Print env
        run: |
          node --version
          npm --version
          uname -a
          sw_vers || true

      - name: Install electron app deps
        working-directory: electron
        env:
          # CRITICAL: matrix builds BOTH arm64 + x64 on the same macos-14
          # (arm64) runner. Without these env vars, postinstall fix-better-sqlite3
          # fetches HOST arch (arm64) for both targets → x64 .dmg ships an arm64
          # native binary → "Bad CPU type in executable" on Intel Macs.
          # fix-better-sqlite3.js reads npm_config_arch + TARGET_ARCH to pick
          # the right prebuilt binary.
          TARGET_ARCH: ${{ matrix.arch }}
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
          npm_config_target_platform: darwin
        run: npm install --no-audit --no-fund

      - name: Verify better-sqlite3 binary arch matches target
        working-directory: electron
        run: |
          node -e "
            const fs=require('fs'),p='node_modules/better-sqlite3/build/Release/better_sqlite3.node';
            if(!fs.existsSync(p)){console.error('FAIL: binary missing');process.exit(1);}
            const fd=fs.openSync(p,'r'),buf=Buffer.alloc(16);
            fs.readSync(fd,buf,0,16,0);fs.closeSync(fd);
            const magicBE=buf.readUInt32BE(0),magicLE=buf.readUInt32LE(0);
            if(magicBE!==0xfeedfacf&&magicLE!==0xfeedfacf){console.error('FAIL: not Mach-O 64');process.exit(1);}
            const cpu=buf.readUInt32LE(4);
            const detected=cpu===0x0100000c?'arm64':cpu===0x01000007?'x64':'unknown';
            const want='${{ matrix.arch }}';
            console.log('better-sqlite3 binary arch:',detected,'target:',want);
            if(detected!==want){console.error('FAIL: arch mismatch');process.exit(1);}
            console.log('OK');
          "

      - name: Pre-bake vendor (real Node + openclaw + 9router)
        working-directory: electron
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: node scripts/prebuild-vendor.js

      - name: Build .dmg
        working-directory: electron
        env:
          # No Apple Developer cert → ship unsigned .dmg. User opens via
          # System Settings → Privacy & Security → "Open Anyway" the first time.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # GitHub-provided token so electron-builder can publish on tag.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            npx electron-builder --mac --arm64 --publish never
          else
            npx electron-builder --mac --x64 --publish never
          fi

      - name: Verify + fix better-sqlite3 arch in final build
        working-directory: electron
        env:
          TARGET_ARCH: ${{ matrix.arch }}
          npm_config_arch: ${{ matrix.arch }}
        run: |
          # electron-builder's @electron/rebuild may have overridden the binary
          # with host arch (arm64) even when targeting x64. Check the FINAL
          # binary inside dist/ and fix if mismatched.
          BINARY=$(find ../dist -name "better_sqlite3.node" -path "*/app.asar.unpacked/*" | head -1)
          if [ -z "$BINARY" ]; then
            echo "WARN: better_sqlite3.node not found in dist (may be inside asar)"
            exit 0
          fi
          DETECTED=$(node -e "
            const fs=require('fs'),fd=fs.openSync('$BINARY','r'),b=Buffer.alloc(16);
            fs.readSync(fd,b,0,16,0);fs.closeSync(fd);
            const cpu=b.readUInt32LE(4);
            console.log(cpu===0x0100000c?'arm64':cpu===0x01000007?'x64':'unknown');
          ")
          echo "Final binary arch: $DETECTED, target: ${{ matrix.arch }}"
          if [ "$DETECTED" = "${{ matrix.arch }}" ]; then
            echo "OK — arch matches"
          else
            echo "MISMATCH — rebuilding better-sqlite3 for ${{ matrix.arch }}"
            cd node_modules/better-sqlite3
            npx --yes prebuild-install -r electron -t 28.3.3 --arch ${{ matrix.arch }} --platform darwin
            FIXED_BINARY="build/Release/better_sqlite3.node"
            if [ -f "$FIXED_BINARY" ]; then
              cp "$FIXED_BINARY" "$BINARY"
              echo "FIXED — copied correct binary into dist"
              # Verify fix
              VERIFY=$(node -e "
                const fs=require('fs'),fd=fs.openSync('$BINARY','r'),b=Buffer.alloc(16);
                fs.readSync(fd,b,0,16,0);fs.closeSync(fd);
                const cpu=b.readUInt32LE(4);
                console.log(cpu===0x0100000c?'arm64':cpu===0x01000007?'x64':'unknown');
              ")
              echo "Verified: $VERIFY"
              if [ "$VERIFY" != "${{ matrix.arch }}" ]; then
                echo "FATAL: still mismatched after fix"
                exit 1
              fi
            else
              echo "FATAL: prebuild-install did not produce binary"
              exit 1
            fi
          fi

      - name: List dist output
        run: ls -lh dist/ || true

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v5
        with:
          name: MODOROClaw-mac-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.dmg" -o -name "*.dmg.blockmap" \) -exec cp {} release/ \;
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## MODOROClaw Mac Release

            **Tải file `.dmg` phù hợp với máy Mac của bạn:**
            - **Apple Silicon (M1/M2/M3/M4)**: file có chữ `arm64`
            - **Intel Mac (cũ hơn 2020)**: file có chữ `x64`

            **Cài đặt:**
            1. Double-click file `.dmg`
            2. Kéo icon **MODOROClaw** vào thư mục **Applications**
            3. Mở Launchpad → click MODOROClaw
            4. Lần đầu tiên macOS sẽ cảnh báo "không verify được" → vào
               **System Settings → Privacy & Security** → cuộn xuống dưới →
               click **"Open Anyway"** → Open. Sau lần này không bị nữa.

            App đã bundle SẴN: Node.js, openclaw, 9router. **Không cần cài
            Homebrew/Node/npm/Terminal — chỉ double-click là chạy.**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
