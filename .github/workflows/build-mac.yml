name: Build Mac .dmg

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub Release with the .dmg files'
        required: false
        default: 'false'

permissions:
  contents: write   # Needed to create releases + upload assets

jobs:
  build:
    name: Build ${{ matrix.arch }} on ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14   # Apple Silicon (M-series)
          - arch: x64
            runner: macos-13   # Intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Print env
        run: |
          node --version
          npm --version
          uname -a
          sw_vers || true

      - name: Install electron app deps
        working-directory: electron
        run: npm install --no-audit --no-fund

      - name: Pre-bake vendor (real Node + openclaw + 9router)
        working-directory: electron
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: node scripts/prebuild-vendor.js

      - name: Build .dmg
        working-directory: electron
        env:
          # No Apple Developer cert → ship unsigned .dmg. User opens via
          # System Settings → Privacy & Security → "Open Anyway" the first time.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # GitHub-provided token so electron-builder can publish on tag.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            npx electron-builder --mac --arm64 --publish never
          else
            npx electron-builder --mac --x64 --publish never
          fi

      - name: List dist output
        run: ls -lh dist/ || true

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: MODOROClaw-mac-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.dmg" -o -name "*.dmg.blockmap" \) -exec cp {} release/ \;
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## MODOROClaw Mac Release

            **Tải file `.dmg` phù hợp với máy Mac của bạn:**
            - **Apple Silicon (M1/M2/M3/M4)**: file có chữ `arm64`
            - **Intel Mac (cũ hơn 2020)**: file có chữ `x64`

            **Cài đặt:**
            1. Double-click file `.dmg`
            2. Kéo icon **MODOROClaw** vào thư mục **Applications**
            3. Mở Launchpad → click MODOROClaw
            4. Lần đầu tiên macOS sẽ cảnh báo "không verify được" → vào
               **System Settings → Privacy & Security** → cuộn xuống dưới →
               click **"Open Anyway"** → Open. Sau lần này không bị nữa.

            App đã bundle SẴN: Node.js, openclaw, 9router. **Không cần cài
            Homebrew/Node/npm/Terminal — chỉ double-click là chạy.**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
